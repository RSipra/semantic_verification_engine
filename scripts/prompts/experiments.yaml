metadata:
  project: harry_potter_trivia
  owner: reemasipra
  created_date: 2025-10-17
  description: Prompt engineering experiments for generating trivia questions using Gemini models.
  question_types:
  - explanatory (EX)
  - factual recall (FR)
  - multiple choice (MCQ)
  version: 0
experiments:
- id: ex_temperature
  question_type: 'EX'
  description: Measure the output variation across different temperature settings
  model: gemini-2.5-pro
  common_parameters:
    max_output_tokens: 12000
    top_p: 0.95
    candidate_count: 3
  runs:
  - version: _02_baseline_v1.1
    goal: Test for consistency at low temperature. Expect outputs to be nearly identical.
    prompt_file: scripts/prompts/iterations/ex_prompt_v0.txt
    source_text_files:
    - - data/06_books/prisoner_of_azkaban_chapter_19.txt
      - data/06_books/goblet_of_fire_chapter_01.txt
    source_info: Prisoner of Azkaban, Chapter 19 and Goblet of Fire, Chapter 1
    output_files:
    - scripts/prompts/llm_outputs/ex_temperature__02_baseline_v1.1_candidate_1.json
    - scripts/prompts/llm_outputs/ex_temperature__02_baseline_v1.1_candidate_2.json
    - scripts/prompts/llm_outputs/ex_temperature__02_baseline_v1.1_candidate_3.json
    model_parameters:
      temperature: 0.2
    metrics:
      response_time_seconds: 55.98
      finish_reason: STOP
      prompt_feedback: ''
      tokens:
        input_cached: 1229
        input_uncached: 14517
        output: 1846
        total: 30442
    quality:
