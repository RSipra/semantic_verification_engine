- id: ex_primacy_bias
  question_type: EX
  description: Confirm if primacy bias in reading chapters exists. The order in this experiment is altered with Book4 Chapter 1 listed read first then Book 3 Chapter 19 (reverse of earlier)
  model: gemini-2.5-pro
  common_parameters:
    max_output_tokens: 12000
    top_p: 0.95
    candidate_count: 3
  runs:
  - version: v.3
    goal: determine if there is primacy bias in the queestion generation and then fix if present.
    prompt_file: scripts/prompts/iterations/ex_prompt_v2_source_ref_fix.txt
    source_text_files:
    - - data/06_books/goblet_of_fire_chapter_01.txt
      - data/06_books/prisoner_of_azkaban_chapter_19.txt
    source_info:
    - Prisoner of Azkaban, Chapter 19
